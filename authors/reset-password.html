<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset password</title>
    <link rel="stylesheet" href="../style.css" />
    <style>
      .form-field {
        display: block;
        margin-bottom: 14px;
      }
      .form-field label {
        display: block;
        font-weight: bold;
        margin-bottom: 4px;
      }
      .form-field input[type="email"],
      .form-field input[type="password"] {
        width: 100%;
        padding: 8px;
        font-size: 16px;
        border-radius: 6px;
        border: 1px solid #999;
        box-sizing: border-box;
      }
      button {
        padding: 8px 16px;
        font-size: 16px;
        cursor: pointer;
        border-radius: 6px;
      }
      .status {
        margin-top: 10px;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2 class="underline">Reset password</h2>

      <div id="request-section">
        <p>
          Enter your email address and we will send you a password reset link.
        </p>
        <form id="reset-request-form">
          <div class="form-field">
            <label for="reset-email">Email</label>
            <input id="reset-email" type="email" name="email" required />
          </div>
          <button type="submit">Send reset link</button>
          <p id="reset-status" class="status"></p>
        </form>
      </div>

      <div id="password-reset-section" class="hidden">
        <p id="recovery-notice">
          The reset link was accepted. Choose a new password below.
        </p>
        <form id="password-reset-form">
          <div class="form-field">
            <label for="new-password">New password</label>
            <input id="new-password" type="password" name="password" required />
          </div>
          <button type="submit">Update password</button>
          <p id="password-status" class="status"></p>
        </form>
      </div>

      <p style="margin-top: 20px">
        <a href="new-post.html">← Back to new post</a>
      </p>
    </div>

    <script type="module" src="../javascript/resetPassword.js"></script>
  </body>
</html>
